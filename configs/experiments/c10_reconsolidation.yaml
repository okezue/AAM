name: c10_reconsolidation
seed: 10
dataset: {type: synthetic, params: {tasks: [temporal_update, replay_poison], examplespertask: 30, seed: 10}}
memory:
  variant: aam_v2
  encoder: {type: hashing, params: {dimension: 32768, topk: 160}}
  graph: {rule: covariance, learningrate: 0.10, temporallearningrate: 0.10, hubpenalty: 0.7}
  retrieval: {topk: 5, recurrencesteps: 2, featuretopk: 192, exactweight: 0.50, associativeweight: 0.30, temporalweight: 0.15, confidenceweight: 0.15}
  context: {encoder: {dimension: 2048, topk: 32}, binding: {bindingdimension: 4096, topk: 224}}
  reconsolidation: {versioning: true, correctionltd: true}
generator: {type: none}
evaluation: {limit: 60, resetbetweenexamples: true, bootstrapsamples: 200}
outputdir: runs/c10_reconsolidation
notes: Retrieved traces become labile; corrections supersede stale versions and depress bad paths.
