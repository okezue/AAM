name: c8_memory_injection
seed: 8
dataset: {type: synthetic, params: {tasks: [paired_associate, paraphrase, multi_hop], examplespertask: 20, seed: 8}}
memory:
  variant: aam_v2
  encoder: {type: hashing, params: {dimension: 32768, topk: 160}}
  graph: {rule: covariance, learningrate: 0.10, temporallearningrate: 0.06, hubpenalty: 0.6}
  retrieval: {topk: 5, recurrencesteps: 2, featuretopk: 192, exactweight: 0.45, associativeweight: 0.45, temporalweight: 0.05}
  context: {encoder: {dimension: 2048, topk: 32}, binding: {bindingdimension: 4096, topk: 224}}
  safety: {notextprimary: true, allowedinjectionmodes: [memory_tokens, side_cross_attention, direct_kv_placeholder]}
generator: {type: none}
evaluation: {limit: 60, resetbetweenexamples: true, bootstrapsamples: 200}
outputdir: runs/c8_memory_injection
notes: Open-model GPU hook configs should train/use memory-token or cross-attention injection; direct-KV remains architecture-specific.
