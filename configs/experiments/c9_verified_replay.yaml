name: c9_verified_replay
seed: 9
dataset: {type: synthetic, params: {tasks: [replay_poison, temporal_update, paired_associate], examplespertask: 30, seed: 9}}
memory:
  variant: aam_v2
  encoder: {type: hashing, params: {dimension: 32768, topk: 160}}
  graph: {rule: covariance, learningrate: 0.10, temporallearningrate: 0.08, hubpenalty: 0.7}
  retrieval: {topk: 5, recurrencesteps: 2, featuretopk: 192, exactweight: 0.50, associativeweight: 0.35, temporalweight: 0.10, confidenceweight: 0.10}
  context: {encoder: {dimension: 2048, topk: 32}, binding: {bindingdimension: 4096, topk: 224}}
  replay: {enabled: true, intervalwrites: 4, budgetpercycle: 8, learningscale: 0.15, strategy: salience}
generator: {type: none}
evaluation: {limit: 90, resetbetweenexamples: true, bootstrapsamples: 200}
outputdir: runs/c9_verified_replay
notes: Source-verified replay must improve retention without amplifying generated/hypothetical false traces.
